<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a0f1f; padding: 2rem; }
  .dp-wrap { font-family: 'Abel', sans-serif; }
  .dp-title { font-size: 42px; font-weight: 700; color: #1de9b6; letter-spacing: 0.02em; margin: 0 0 1.25rem; }
  .dp-intro { background: #2a1a2e; border: 0.5px solid rgba(29,233,182,0.25); border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: flex-start; gap: 14px; }
  .dp-intro-icon { width: 36px; height: 36px; border-radius: 10px; background: rgba(29,233,182,0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .dp-intro-icon i { font-size: 18px; color: #1de9b6; }
  .dp-intro-label { font-size: 11px; color: #9a8aa0; text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 5px; }
  .dp-intro-text { font-size: 15px; color: #c0b0c8; line-height: 1.7; margin: 0; }
  .dp-focus-label { font-size: 11px; color: #9a8aa0; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
  .dp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .dp-card { background: #2a1a2e; border: 0.5px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px; }
  .dp-card-icon { width: 32px; height: 32px; border-radius: 50%; background: rgba(29,233,182,0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .dp-card-icon i { font-size: 16px; color: #1de9b6; }
  .dp-card-text { font-size: 15px; color: #f0f0f0; }
  @media (max-width: 600px) { .dp-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="dp-wrap">
  <p class="dp-title">Props & Handcrafted Works</p>

  <div class="dp-intro">
    <div class="dp-intro-icon"><i class="ti ti-hammer"></i></div>
    <div>
      <p class="dp-intro-label">Introduction</p>
      <p class="dp-intro-text">Physical works exploring object design, materiality, and handcrafted storytelling through film props, clay sculptures, wearable objects, and miniature designs.</p>
    </div>
  </div>

  <p class="dp-focus-label">Skills</p>
  <div class="dp-grid">
    <div class="dp-card">
      <div class="dp-card-icon"><i class="ti ti-puzzle"></i></div>
      <p class="dp-card-text">Prop Design</p>
    </div>
    <div class="dp-card">
      <div class="dp-card-icon"><i class="ti ti-cube"></i></div>
      <p class="dp-card-text">Object Design</p>
    </div>
    <div class="dp-card">
      <div class="dp-card-icon"><i class="ti ti-texture"></i></div>
      <p class="dp-card-text">Material Exploration</p>
    </div>
    <div class="dp-card">
      <div class="dp-card-icon"><i class="ti ti-mood-smile"></i></div>
      <p class="dp-card-text">Sculpture</p>
    </div>
    <div class="dp-card">
      <div class="dp-card-icon"><i class="ti ti-hand-finger"></i></div>
      <p class="dp-card-text">Handcraft</p>
    </div>
  </div>
</div>
</body>
</html>

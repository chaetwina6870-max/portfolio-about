
<link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

<style>
  .sw-wrap { font-family: 'Abel', sans-serif; padding: 1.5rem 2rem; background: #1a0f1f; border-radius: 12px; }

  .sw-row { display: flex; flex-wrap: wrap; gap: 10px; }
  .sw-tag { display: flex; align-items: center; gap: 8px; background: #2a1a2e; border: 0.5px solid rgba(255,255,255,0.08); border-radius: 999px; padding: 8px 16px; }
  .sw-tag i { font-size: 15px; color: #1de9b6; }
  .sw-tag span { font-size: 14px; color: #f0f0f0; white-space: nowrap; }
  .sw-tag .sw-level { font-size: 11px; color: #9a8aa0; }

<div class="sw-wrap">
  <p class="sw-label">Software</p>
  <div class="sw-row">
    <div class="sw-tag"><i class="ti ti-check" aria-hidden="true"></i><span>Adobe Photoshop</span></div>
    <div class="sw-tag"><i class="ti ti-check" aria-hidden="true"></i><span>Adobe Illustrator</span></div>
    <div class="sw-tag"><i class="ti ti-check" aria-hidden="true"></i><span>Procreate</span></div>
    <div class="sw-tag"><i class="ti ti-check" aria-hidden="true"></i><span>Blender <span class="sw-level">(Basic)</span></span></div>
    <div class="sw-tag"><i class="ti ti-check" aria-hidden="true"></i><span>ZBrush <span class="sw-level">(Basic)</span></span></div>

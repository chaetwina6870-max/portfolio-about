<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a0f1f; padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  .cs-banner { width: 100%; border-radius: 12px; display: block; object-fit: cover; }
  .cs-btn { display: inline-flex; align-items: center; gap: 8px; background: rgba(29,233,182,0.1); border: 0.5px solid rgba(29,233,182,0.4); border-radius: 999px; padding: 12px 32px; color: #1de9b6; font-size: 18px; text-decoration: none; font-family: 'Abel', sans-serif; transition: background 0.2s; }
  .cs-btn:hover { background: rgba(29,233,182,0.2); }
  .cs-btn i { font-size: 20px; }
</style>
</head>
<body>
  <img class="cs-banner" src="banner.jpeg" alt="Chaeniri Shows YouTube channel banner">
  <a class="cs-btn" href="https://youtube.com/channel/UCI5wyqiNFaKXMaQ0-flWZ8Q" target="_blank">
    <i class="ti ti-brand-youtube"></i>
    Watch on YouTube
  </a>
</body>
</html>
